name: CI

# Runs the project gates on every pull request and on pushes to main:
# the unit tests, the LaNorme dogfood lint, and a package build. Mirrors the
# local pre-commit hooks so a green PR means a clean tree.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Agent artifacts in sync
        run: scripts/sync-agents.sh --check

      - name: Unit tests
        run: uv run --group dev pytest tests/unit

      - name: Lint (lanorme dogfood)
        run: uv run lanorme check .

      - name: Build
        run: uv build
